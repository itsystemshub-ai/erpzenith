# Backend - NestJS en Render
# Este archivo configura el deploy del backend en Render

services:
  - type: web
    name: erpzenith-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd apps/backend && npm install && npm run generate && npm run build
    startCommand: cd apps/backend && npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: "*"
