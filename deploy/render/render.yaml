services:
  - type: web
    name: erpzenith-backend
    env: node
    region: oregon
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
